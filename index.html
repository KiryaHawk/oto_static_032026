<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=6c42bc19-1776-466a-900c-75c1c68e67f4" type="text/javascript"></script>

    <title>static_02_2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        #filter-container {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #filter-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        #filter-toggle,
        #gibdd-toggle {
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.1);
            background: #ffffffee;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: background 0.15s, box-shadow 0.15s, transform 0.05s, border-color 0.15s;
        }

        #filter-toggle:hover,
        #gibdd-toggle:hover {
            background: #f5f5f5;
            box-shadow: 0 3px 10px rgba(0,0,0,0.18);
        }

        #filter-toggle:active,
        #gibdd-toggle:active {
            transform: translateY(1px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        #gibdd-toggle.active {
            background: #e6f2ff;
            border-color: #3b82f6;
        }

        #filter-panel {
            padding: 10px 12px;
            width: 240px;
            border-radius: 12px;
            background: #ffffffee;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            font-size: 12px;
            display: none;
        }

        #filter-panel-label,
        .filter-block-label {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .filter-block {
            margin-bottom: 10px;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #quantity-range,
        #quantity-input,
        #category-select {
            width: 100%;
        }

        #quantity-input,
        #category-select {
            box-sizing: border-box;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.2);
            font-size: 12px;
            background: #fff;
        }

        #filter-current-value {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div id="map"></div>

<div id="filter-container">
    <div id="filter-header">
        <button id="filter-toggle">Фильтры</button>
        <button id="gibdd-toggle" class="active">ГИБДД</button>
    </div>

    <div id="filter-panel">
        <div class="filter-block">
            <div class="filter-block-label">Мин. кол-во ДК за месяц</div>
            <div class="filter-controls">
                <input type="range" id="quantity-range" min="0" max="100" value="0" step="1">
                <input type="number" id="quantity-input" min="0" value="0">
            </div>
            <div id="filter-current-value">Показываются точки с кол-вом ≥ 0</div>
        </div>

        <div class="filter-block">
            <div class="filter-block-label">Категория</div>
            <div class="filter-controls">
                <select id="category-select">
                    <option value="ALL">Все категории</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
