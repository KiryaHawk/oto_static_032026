<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=6c42bc19-1776-466a-900c-75c1c68e67f4" type="text/javascript"></script>

    <title>static_02_2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        #filter-container {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #filter-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        #dk-filter-toggle,
        #category-filter-toggle,
        #gibdd-toggle,
        #categories-select-all,
        #categories-clear-all {
            padding: 6px 14px;
            font-size: 12px;
            line-height: 1.2;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.14);
            background: rgba(255,255,255,0.95);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.14);
            transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        #dk-filter-toggle:hover,
        #category-filter-toggle:hover,
        #gibdd-toggle:hover,
        #categories-select-all:hover,
        #categories-clear-all:hover {
            background: #f5f5f5;
            box-shadow: 0 3px 8px rgba(0,0,0,0.16);
        }

        #gibdd-toggle.active {
            background: #e6f2ff;
            border-color: #3b82f6;
        }

        .filter-panel {
            display: none;
            width: 250px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(245, 245, 245, 0.96);
            box-shadow: 0 8px 18px rgba(0,0,0,0.16);
            margin-bottom: 8px;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #222;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #quantity-range {
            width: 100%;
        }

        #quantity-input {
            width: 100%;
            box-sizing: border-box;
            padding: 5px 7px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.2);
            font-size: 12px;
            background: #fff;
        }

        #filter-current-value {
            font-size: 11px;
            color: #555;
            margin-top: 6px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px 12px;
            margin-bottom: 10px;
        }

        .category-check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .category-check-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        @media (max-width: 640px) {
            .filter-panel {
                width: 220px;
            }

            .category-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div id="map"></div>

<div id="filter-container">
    <div id="filter-header">
        <button id="dk-filter-toggle">Фильтр по ДК</button>
        <button id="category-filter-toggle">Фильтр по категориям</button>
        <button id="gibdd-toggle" class="active">ГИБДД</button>
    </div>

    <div id="dk-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по ДК</div>

        <div class="filter-controls">
            <input type="range" id="quantity-range" min="0" max="100" value="0" step="1">
            <input type="number" id="quantity-input" min="0" value="0">
        </div>

        <div id="filter-current-value">Показываются точки с кол-вом ≥ 0</div>
    </div>

    <div id="category-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по категориям</div>

        <div id="category-checkboxes" class="category-grid"></div>

        <div class="category-actions">
            <button type="button" id="categories-select-all">Все</button>
            <button type="button" id="categories-clear-all">Сброс</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
